{% extends 'base.html' %}
{% load static %}

{% block contents %}
<div class="glass-card" style="max-width: 500px; padding: 50px;">
    <div style="text-align: center; margin-bottom: 35px;">
        <div style="width: 70px; height: 70px; background: rgba(37, 99, 235, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <i class="fas fa-user-tie" style="font-size: 2rem; color: var(--primary-blue);"></i>
        </div>
        <h1 style="color: var(--primary-dark); font-size: 1.8rem; font-weight: 800; margin: 0;">Employee Login</h1>
        <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 10px;">Please enter your credentials to access the portal.</p>
    </div>

    <form action="/employeeLoginCheck" method="POST">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px; position: relative;">
            <label style="display: block; font-weight: 700; font-size: 0.85rem; color: var(--primary-dark); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Login ID</label>
            <div style="position: relative;">
                <i class="fas fa-id-badge" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"></i>
                <input type="text" name="loginid" required placeholder="Enter your ID" 
                    style="width: 100%; padding: 12px 15px 12px 45px; border-radius: 12px; border: 1px solid #e2e8f0; background: rgba(255,255,255,0.8); font-size: 1rem; box-sizing: border-box; transition: 0.3s; outline: none;"
                    onfocus="this.style.borderColor='var(--primary-blue)'; this.style.boxShadow='0 0 0 4px rgba(37, 99, 235, 0.1)'"
                    onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none'">
            </div>
        </div>

        <div style="margin-bottom: 30px; position: relative;">
            <label style="display: block; font-weight: 700; font-size: 0.85rem; color: var(--primary-dark); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Password</label>
            <div style="position: relative;">
                <i class="fas fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"></i>
                <input type="password" name="pswd" required placeholder="••••••••" 
                    style="width: 100%; padding: 12px 15px 12px 45px; border-radius: 12px; border: 1px solid #e2e8f0; background: rgba(255,255,255,0.8); font-size: 1rem; box-sizing: border-box; transition: 0.3s; outline: none;"
                    onfocus="this.style.borderColor='var(--primary-blue)'; this.style.boxShadow='0 0 0 4px rgba(37, 99, 235, 0.1)'"
                    onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none'">
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button type="submit" style="width: 100%; background: var(--primary-blue); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);"
                onmouseover="this.style.background='#1d4ed8'; this.style.transform='translateY(-2px)'"
                onmouseout="this.style.background='var(--primary-blue)'; this.style.transform='translateY(0)'">
                Sign In
            </button>
            
            <button type="reset" style="width: 100%; background: transparent; color: var(--text-muted); border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.2s;"
                onmouseover="this.style.background='#f1f5f9'"
                onmouseout="this.style.background='transparent'">
                Clear Fields
            </button>
        </div>
    </form>

    <div style="margin-top: 30px; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 20px;">
        <p style="color: var(--text-muted); font-size: 0.9rem;">
            Don't have an account? <a href="{% url 'employeeRegisterForm' %}" style="color: var(--primary-blue); text-decoration: none; font-weight: 700;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
