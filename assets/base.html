<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Guard | Insurance Fraud Detection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --primary-dark: #1e3a8a;
            --text-main: #0f172a;
            --text-muted: #334155;
            --glass-bg: rgba(255, 255, 255, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.75)), 
                        url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
        }

        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-brand h1 {
            font-size: 1.3rem;
            color: var(--primary-dark);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        /* Navigation Menu */
        .nav-menu {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .nav-link:hover { color: var(--primary-blue); }

        /* Mobile Toggle Button */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--primary-dark);
            cursor: pointer;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 1000px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        main {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .footer {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 25px 20px;
            text-align: center;
            border-top: 1px solid var(--glass-border);
        }

        #scroll-to-top {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary-blue);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            z-index: 1000;
        }

        /* Tablet/Mobile Adjustments */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-menu {
                display: none; /* Hidden by default on mobile */
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--white);
                flex-direction: column;
                padding: 20px;
                gap: 15px;
                box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            }
            .nav-menu.active { display: flex; }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <a class="navbar-brand" href="{% url 'index' %}">
                <i class="fas fa-shield-halved" style="color: var(--primary-blue); font-size: 1.8rem;"></i>
                <h1>Auto-Guard</h1>
            </a>

            <button class="menu-toggle" id="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            
            <ul class="nav-menu" id="nav-list">
                <li><a class="nav-link" href="{% url 'index' %}">Home</a></li>
                <li><a class="nav-link" href="{% url 'employeeLogin' %}">Employee</a></li>
                <li><a class="nav-link" href="{% url 'employeeRegisterForm' %}">Registration</a></li>
                <li><a class="nav-link" href="{% url 'managementLogin' %}">Management</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block contents %}{% endblock %}
    </main>

    <footer class="footer">
        <p style="margin:0; font-weight:600; color: var(--text-muted);">
            &copy; 2024 Auto Insurance Fraud Detection System | Built by MslCorporations
        </p>
    </footer>

    <button id="scroll-to-top"><i class="fas fa-arrow-up"></i></button>

    <script>
        // Scroll Logic
        const btn = document.getElementById("scroll-to-top");
        window.onscroll = () => {
            btn.style.display = window.scrollY > 300 ? "block" : "none";
        };
        btn.onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });

        // Mobile Menu Toggle Logic
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navList = document.getElementById('nav-list');

        menuBtn.addEventListener('click', () => {
            navList.classList.toggle('active');
        });
    </script>
</body>
</html>
