<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal | Auto-Guard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --primary-dark: #1e3a8a;
            --text-main: #0f172a;
            --text-muted: #334155;
            --glass-bg: rgba(255, 255, 255, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* Using the same background for consistency */
            background: linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.75)), 
                        url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
        }

        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand h1 {
            font-size: 1.2rem;
            color: var(--primary-dark);
            margin: 0;
            text-transform: uppercase;
            font-weight: 800;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .nav-link:hover {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-blue);
        }

        .logout-link {
            color: #dc2626 !important; /* Red for logout */
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 1000px;
            width: 95%;
            margin: 40px auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        main { flex: 1; }

        .footer {
            background: rgba(255, 255, 255, 0.6);
            padding: 20px;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .nav-menu { gap: 10px; }
            .nav-link { font-size: 0.8rem; padding: 5px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <div class="navbar-brand">
                <h1><i class="fas fa-user-gear" style="color: var(--primary-blue);"></i> Employee Panel</h1>
            </div>
            <ul class="nav-menu">
                <li><a class="nav-link" href="{% url 'employeehome' %}">Dashboard</a></li>
                <li><a class="nav-link" href="/Classification_result">Results</a></li>
                <li><a class="nav-link" href="/dataset">Dataset</a></li>
                <li><a class="nav-link" href="/prediction">Prediction</a></li>
                <li><a class="nav-link logout-link" href="/"><i class="fas fa-sign-out-alt"></i></a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block contents %}{% endblock %}
    </main>

    <footer class="footer">
        &copy; 2024 Auto Insurance Fraud Detection | MslCorporations
    </footer>
</body>
</html>
